name: CI - Workflow

on:
  push:
    branches: [ main ]      # run when commits land on main
  pull_request:             # run on every PR, against any branch

jobs:
  build:
    name: Job -  Build, Test and analyse
    runs-on: ubuntu-latest  # GitHub gives you a fresh Linux VM per run
    steps:
      - name: Step - Check out the code
        uses: actions/checkout@v4

      - name: Step - Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven        # caches ~/.m2 so dependencies don't re-download every run

      - name: Step - Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
            path: ~/.sonar/cache
            key: ${{ runner.os }}-sonar
            restore-keys: ${{ runner.os }}-sonar

      - name: Step - Build and test and Sonar scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=pradyojha_order-service